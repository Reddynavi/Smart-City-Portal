name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  security-and-build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Dependency Scanning (npm audit)
      run: npm audit --audit-level=moderate
      continue-on-error: true # Warning only, don't fail build for dummy project

    - name: Secret Scanning (TruffleHog)
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        head: HEAD

    - name: SAST Code Scanning (Semgrep)
      run: |
        python -m pip install semgrep
        semgrep ci --config "p/react" --config "p/javascript"
      continue-on-error: true # Warning only

    - name: Build Application
      run: npm run build
      
    - name: Lint Code
      run: npm run lint
      continue-on-error: true

    # For a real project, deployment steps (e.g., Docker build, push, deploy to AWS/Vercel) would go here
