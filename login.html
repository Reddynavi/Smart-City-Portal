<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart City Services</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-city"></i>
                Smart City
            </a>
            <div class="mobile-toggle">
                <i class="fa-solid fa-bars"></i>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="complaint.html">Complaint</a>
                <a href="bill.html">Bills</a>
                <a href="traffic.html">Traffic</a>
                <a href="parking.html">Parking</a>
                <a href="dashboard.html">Admin Portal</a>
                <a href="contact.html">Contact</a>
                <a href="login.html" class="btn btn-primary active" style="color: white;">Login</a>
                <button class="theme-toggle" title="Toggle Theme">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Login Section -->
    <div class="auth-container">
        <div class="card glass auth-card">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Sign in to access municipal services</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username or Email</label>
                    <input type="text" id="username" class="form-control" placeholder="Enter your username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                    <i class="fa-solid fa-eye password-toggle"></i>
                </div>

                <a href="#" class="forgot-password">Forgot Password?</a>
                <div style="clear: both;"></div>

                <div class="form-check">
                    <input type="checkbox" id="remember">
                    <label for="remember">Remember me</label>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Register here</a></p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Smart City Services Portal. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Custom JS -->
    <script src="js/script.js"></script>
</body>
</html>
