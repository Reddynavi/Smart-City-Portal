---
# ============================================
# Deploy Smart City Portal to EC2
# ============================================
- name: Deploy Smart City Portal Application
  hosts: "{{ target_env | default('green') }}"
  become: yes

  vars:
    app_dir: /var/www/html
    backend_dir: /opt/smart-city-backend
    repo_url: https://github.com/Reddynavi/Smart-City-Portal.git

  tasks:
    - name: Clean previous deployment
      file:
        path: "{{ app_dir }}"
        state: absent

    - name: Recreate web directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: "0755"

    - name: Install Git
      yum:
        name: git
        state: present

    - name: Clone repository
      git:
        repo: "{{ repo_url }}"
        dest: /tmp/smart-city-portal
        version: main
        force: yes

    - name: Copy frontend files to Apache
      shell: |
        cp -r /tmp/smart-city-portal/*.html {{ app_dir }}/
        cp -r /tmp/smart-city-portal/css {{ app_dir }}/
        cp -r /tmp/smart-city-portal/js {{ app_dir }}/
        cp -r /tmp/smart-city-portal/public {{ app_dir }}/

    - name: Setup backend directory
      file:
        path: "{{ backend_dir }}"
        state: directory
        mode: "0755"

    - name: Copy backend files
      shell: |
        cp -r /tmp/smart-city-portal/backend/* {{ backend_dir }}/
        cp /tmp/smart-city-portal/package.json {{ backend_dir }}/

    - name: Install backend dependencies
      shell: |
        cd {{ backend_dir }}
        npm install express mongoose cors dotenv

    - name: Create backend .env file
      copy:
        content: |
          MONGO_URI=mongodb+srv://Navya_db:navya123@cluster0.65ogkro.mongodb.net/SmartCity?retryWrites=true&w=majority
          PORT=5000
        dest: "{{ backend_dir }}/.env"
        mode: "0600"

    - name: Create systemd service for backend
      copy:
        content: |
          [Unit]
          Description=Smart City Backend API
          After=network.target

          [Service]
          Type=simple
          User=root
          WorkingDirectory={{ backend_dir }}
          ExecStart=/usr/bin/node server.js
          Restart=on-failure
          RestartSec=10
          Environment=NODE_ENV=production

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/smart-city-backend.service
        mode: "0644"

    - name: Start backend service
      systemd:
        name: smart-city-backend
        state: restarted
        enabled: yes
        daemon_reload: yes

    - name: Set proper permissions
      file:
        path: "{{ app_dir }}"
        recurse: yes
        mode: "0644"
        owner: apache
        group: apache

    - name: Restart Apache
      systemd:
        name: httpd
        state: restarted

    - name: Wait for application to be ready
      uri:
        url: "http://localhost/index.html"
        status_code: 200
      register: deploy_result
      retries: 5
      delay: 3

    - name: Cleanup temp files
      file:
        path: /tmp/smart-city-portal
        state: absent

    - name: Deployment status
      debug:
        msg: "✅ Smart City Portal deployed successfully on {{ inventory_hostname }}!"
